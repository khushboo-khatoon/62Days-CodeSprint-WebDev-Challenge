<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexeme — English Dictionary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --paper: #F1EFE6;
    --paper-raised: #E8E4D6;
    --ink: #1C1B17;
    --ink-dim: #6b6a5f;
    --ink-dimmer: #a5a394;
    --rule: #d6d2c2;
    --teal: #1F6F5C;
    --teal-soft: rgba(31,111,92,0.12);
    --gold: #B98A22;
    --error: #B0402C;
    --serif: 'Fraunces', serif;
    --sans: 'Inter', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  [data-theme="dark"]{
    --paper: #1B1A17;
    --paper-raised: #242320;
    --ink: #EDE9DD;
    --ink-dim: #a5a191;
    --ink-dimmer: #6b6a5f;
    --rule: #38362f;
    --teal: #4FBFA0;
    --teal-soft: rgba(79,191,160,0.14);
    --gold: #E0B34E;
    --error: #E07A63;
  }

  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    transition: background .25s ease, color .25s ease;
    min-height: 100vh;
  }

  .wrap{
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 22px 90px;
  }

  .top-row{
    display:flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 34px;
  }
  .brand{
    display:flex;
    align-items: baseline;
    gap: 8px;
  }
  .brand .mark{
    font-family: var(--serif);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  .brand .tag{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .theme-toggle{
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-dim);
    border-radius: 999px;
    width: 38px; height: 38px;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    font-size: 16px;
    transition: border-color .15s ease, color .15s ease;
  }
  .theme-toggle:hover{ border-color: var(--teal); color: var(--teal); }

  .search-box{
    display:flex;
    align-items: center;
    gap: 10px;
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 6px 6px 6px 20px;
  }
  .search-box:focus-within{
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-soft);
  }
  .search-box input{
    flex:1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink);
    padding: 12px 0;
  }
  .search-box input::placeholder{ color: var(--ink-dimmer); font-style: italic; }
  .search-btn{
    background: var(--teal);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s ease;
  }
  .search-btn:hover{ opacity: 0.88; }
  .search-btn:disabled{ opacity: 0.5; cursor: default; }

  /* States */
  .state-panel{
    margin-top: 50px;
    text-align: center;
    color: var(--ink-dim);
  }
  .state-panel.hidden{ display: none; }
  .loading-dial{
    width: 34px; height: 34px;
    margin: 0 auto 16px;
    border-radius: 50%;
    border: 3px solid var(--rule);
    border-top-color: var(--teal);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .state-panel p{ font-family: var(--sans); font-size: 14px; margin: 0; }
  .error-panel .error-word{
    font-family: var(--serif);
    font-style: italic;
    color: var(--error);
  }
  .error-panel .icon{
    font-family: var(--serif);
    font-size: 40px;
    color: var(--error);
    margin-bottom: 10px;
    display:block;
  }

  /* Entry */
  #entry{ margin-top: 44px; }
  #entry.hidden{ display: none; }

  .headword-row{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px 20px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 18px;
    margin-bottom: 22px;
  }
  .headword{
    font-family: var(--serif);
    font-size: 44px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .phonetics-line{
    display:flex;
    align-items:center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .phon-item{
    display:flex;
    align-items:center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 15px;
    color: var(--gold);
  }
  .play-btn{
    background: none;
    border: 1px solid var(--rule);
    color: var(--teal);
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px;
    flex-shrink: 0;
    transition: background .15s ease, transform .1s ease;
  }
  .play-btn:hover{ background: var(--teal-soft); }
  .play-btn:active{ transform: scale(0.92); }
  .play-btn.playing{ background: var(--teal); color: var(--paper); }

  .meaning-block{
    margin-bottom: 28px;
  }
  .pos-row{
    display:flex;
    align-items:center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .pos{
    font-family: var(--serif);
    font-style: italic;
    font-size: 19px;
    color: var(--teal);
  }
  .pos-rule{
    flex:1;
    height: 1px;
    background: var(--rule);
  }

  .def-list{
    list-style: none;
    margin: 0; padding: 0;
    counter-reset: def-counter;
  }
  .def-item{
    counter-increment: def-counter;
    position: relative;
    padding-left: 30px;
    margin-bottom: 16px;
    line-height: 1.6;
    font-size: 15.5px;
  }
  .def-item::before{
    content: counter(def-counter);
    position: absolute;
    left: 0; top: 1px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-dimmer);
    width: 20px;
  }
  .def-text{ color: var(--ink); }
  .def-example{
    display: block;
    margin-top: 5px;
    color: var(--ink-dim);
    font-style: italic;
    font-size: 14.5px;
  }
  .def-example::before{ content: "“"; }
  .def-example::after{ content: "”"; }

  .word-relations{
    display:flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    padding-left: 30px;
  }
  .word-chip{
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--paper-raised);
    color: var(--ink-dim);
    border: 1px solid var(--rule);
    cursor: pointer;
    transition: border-color .15s ease, color .15s ease;
  }
  .word-chip:hover{ border-color: var(--teal); color: var(--teal); }
  .word-chip.antonym{ color: var(--error); }
  .word-chip.antonym:hover{ border-color: var(--error); color: var(--error); }

  .rel-label{
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-dimmer);
    padding-left: 30px;
    margin-top: 10px;
    display:block;
  }

  .source-note{
    margin-top: 36px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dimmer);
  }
  .source-note a{ color: var(--teal); text-decoration: none; }

  .welcome-panel{
    margin-top: 60px;
    text-align: center;
    color: var(--ink-dimmer);
  }
  .welcome-panel .big{
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }
  .welcome-panel .examples{
    display:flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .welcome-panel .examples span{
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 5px 12px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    cursor: pointer;
  }
  .welcome-panel .examples span:hover{ border-color: var(--teal); color: var(--teal); }

  @media (max-width: 560px){
    .headword{ font-size: 34px; }
    .search-box{ padding-left: 14px; }
    .search-box input{ font-size: 18px; }
    .search-btn{ padding: 11px 14px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-row">
    <div class="brand">
      <span class="mark">Lexeme</span>
      <span class="tag">/ dictionary</span>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle light/dark" aria-label="Toggle theme">◐</button>
  </div>

  <form class="search-box" id="searchForm">
    <input type="text" id="wordInput" placeholder="Look up a word…" autocomplete="off" autofocus>
    <button type="submit" class="search-btn" id="searchBtn">Search</button>
  </form>

  <div class="state-panel hidden" id="loadingPanel">
    <div class="loading-dial"></div>
    <p>Turning the pages…</p>
  </div>

  <div class="state-panel hidden error-panel" id="errorPanel">
    <span class="icon">?</span>
    <p>No entry found for <span class="error-word" id="errorWord"></span>.</p>
    <p style="margin-top:6px; font-size:13px;">Check the spelling, or try a related word.</p>
  </div>

  <div class="welcome-panel" id="welcomePanel">
    <div class="big">Every word has a story. Start with one.</div>
    <div class="examples">
      <span data-word="serendipity">serendipity</span>
      <span data-word="ephemeral">ephemeral</span>
      <span data-word="resilient">resilient</span>
      <span data-word="lucid">lucid</span>
    </div>
  </div>

  <div id="entry" class="hidden"></div>

</div>

<script>
  const form = document.getElementById('searchForm');
  const input = document.getElementById('wordInput');
  const searchBtn = document.getElementById('searchBtn');
  const loadingPanel = document.getElementById('loadingPanel');
  const errorPanel = document.getElementById('errorPanel');
  const errorWord = document.getElementById('errorWord');
  const welcomePanel = document.getElementById('welcomePanel');
  const entryEl = document.getElementById('entry');
  const themeToggle = document.getElementById('themeToggle');

  let currentAudio = null;
  let currentPlayBtn = null;

  themeToggle.addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    themeToggle.textContent = isDark ? '◐' : '◑';
  });

  document.querySelectorAll('.welcome-panel .examples span').forEach(el => {
    el.addEventListener('click', () => {
      input.value = el.dataset.word;
      form.requestSubmit();
    });
  });

  function showState(state, word){
    welcomePanel.classList.add('hidden');
    loadingPanel.classList.toggle('hidden', state !== 'loading');
    errorPanel.classList.toggle('hidden', state !== 'error');
    entryEl.classList.toggle('hidden', state !== 'result');
    if (state === 'error') errorWord.textContent = `“${word}”`;
    if (state !== 'error' && state !== 'result' && state !== 'loading') {
      welcomePanel.classList.remove('hidden');
    }
  }

  function stopAudio(){
    if (currentAudio){
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
    if (currentPlayBtn) currentPlayBtn.classList.remove('playing');
    currentAudio = null;
    currentPlayBtn = null;
  }

  function playAudio(url, btn){
    if (currentPlayBtn === btn && currentAudio && !currentAudio.paused){
      stopAudio();
      return;
    }
    stopAudio();
    currentAudio = new Audio(url);
    currentPlayBtn = btn;
    btn.classList.add('playing');
    currentAudio.play().catch(() => {});
    currentAudio.addEventListener('ended', () => {
      btn.classList.remove('playing');
      currentAudio = null;
      currentPlayBtn = null;
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderEntry(data){
    const entryData = data[0];
    const word = entryData.word;

    // Collect phonetics with audio where available
    const phonetics = (entryData.phonetics || []).filter(p => p.text || p.audio);
    const textPhonetic = entryData.phonetic || (phonetics.find(p => p.text) || {}).text || '';

    let html = '';

    html += `<div class="headword-row">`;
    html += `<div class="headword">${escapeHtml(word)}</div>`;
    html += `<div class="phonetics-line">`;

    if (textPhonetic){
      html += `<div class="phon-item">${escapeHtml(textPhonetic)}</div>`;
    }

    const audioPhonetics = phonetics.filter(p => p.audio);
    audioPhonetics.slice(0, 2).forEach((p, i) => {
      html += `<button class="play-btn" data-audio="${escapeHtml(p.audio)}" aria-label="Play pronunciation" title="Play pronunciation">▶</button>`;
    });

    html += `</div></div>`;

    (entryData.meanings || []).forEach(meaning => {
      html += `<div class="meaning-block">`;
      html += `<div class="pos-row"><span class="pos">${escapeHtml(meaning.partOfSpeech)}</span><div class="pos-rule"></div></div>`;
      html += `<ol class="def-list">`;
      (meaning.definitions || []).slice(0, 5).forEach(def => {
        html += `<li class="def-item"><span class="def-text">${escapeHtml(def.definition)}</span>`;
        if (def.example){
          html += `<span class="def-example">${escapeHtml(def.example)}</span>`;
        }
        html += `</li>`;
      });
      html += `</ol>`;

      const synonyms = new Set();
      const antonyms = new Set();
      (meaning.synonyms || []).forEach(s => synonyms.add(s));
      (meaning.antonyms || []).forEach(a => antonyms.add(a));
      (meaning.definitions || []).forEach(def => {
        (def.synonyms || []).forEach(s => synonyms.add(s));
        (def.antonyms || []).forEach(a => antonyms.add(a));
      });

      if (synonyms.size){
        html += `<span class="rel-label">Synonyms</span>`;
        html += `<div class="word-relations">`;
        [...synonyms].slice(0, 8).forEach(s => {
          html += `<span class="word-chip" data-word="${escapeHtml(s)}">${escapeHtml(s)}</span>`;
        });
        html += `</div>`;
      }
      if (antonyms.size){
        html += `<span class="rel-label">Antonyms</span>`;
        html += `<div class="word-relations">`;
        [...antonyms].slice(0, 8).forEach(a => {
          html += `<span class="word-chip antonym" data-word="${escapeHtml(a)}">${escapeHtml(a)}</span>`;
        });
        html += `</div>`;
      }

      html += `</div>`;
    });

    html += `<div class="source-note">Definitions via <a href="https://dictionaryapi.dev" target="_blank" rel="noopener">Free Dictionary API</a></div>`;

    entryEl.innerHTML = html;

    entryEl.querySelectorAll('.play-btn').forEach(btn => {
      btn.addEventListener('click', () => playAudio(btn.dataset.audio, btn));
    });
    entryEl.querySelectorAll('.word-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        input.value = chip.dataset.word;
        form.requestSubmit();
      });
    });
  }

  async function lookup(word){
    stopAudio();
    showState('loading');
    searchBtn.disabled = true;

    try{
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      if (!res.ok){
        showState('error', word);
        return;
      }
      const data = await res.json();
      renderEntry(data);
      showState('result');
    } catch(err){
      showState('error', word);
    } finally {
      searchBtn.disabled = false;
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const word = input.value.trim();
    if (!word) return;
    lookup(word);
  });
</script>
</body>
</html>
