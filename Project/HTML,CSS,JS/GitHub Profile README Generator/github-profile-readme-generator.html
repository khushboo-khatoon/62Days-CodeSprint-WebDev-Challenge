<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>GitHub Profile README Generator</title>
    <style>
      /* ========================================
         Reset & Base
         ======================================== */
      :root {
        --bg-base: #f6f8fa;
        --bg-surface: #ffffff;
        --border: #d0d7de;
        --text-main: #1f2328;
        --text-muted: #656d76;
        --accent: #0969da;
        --accent-hover: #0353a4;
        --radius: 6px;
        --font-sans: "Titillium Web", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        --font-mono: "Titillium Web", ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-base: #0d1117;
          --bg-surface: #161b22;
          --border: #30363d;
          --text-main: #c9d1d9;
          --text-muted: #8b949e;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        line-height: 1.6;
        background: var(--bg-base);
        color: var(--text-main);
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
      }
      header h1 {
        font-size: 2rem;
        font-weight: 600;
      }
      header p {
        color: var(--text-muted);
        font-size: 1.1rem;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      @media (max-width: 800px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        padding: 1rem;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
      }

      .tab-nav {
        display: flex;
        border-bottom: 1px solid var(--border);
      }

      .tab-btn {
        padding: 0.75rem 1.25rem;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-weight: 500;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tab-btn.active {
        color: var(--text-main);
        border-bottom-color: var(--accent);
      }

      .panel-body {
        padding: 1rem;
      }

      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.9rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
      }
      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-base);
        color: var(--text-main);
        font-size: 0.9rem;
      }
      .form-group textarea {
        min-height: 80px;
        resize: vertical;
        font-family: var(--font-mono);
      }
      .form-group input:focus,
      .form-group textarea:focus {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-color: var(--accent);
      }

      .tab-pane {
        display: none;
        height: 100%;
      }
      .tab-pane.active {
        display: block;
      }

      #markdown-editor {
        width: 100%;
        height: 100%;
        border: none;
        padding: 1rem;
        background: var(--bg-surface);
        color: var(--text-main);
        font-family: var(--font-mono);
        font-size: 0.9rem;
        line-height: 1.5;
        resize: none;
      }
      #markdown-editor:focus {
        outline: none;
      }

      #preview-content {
        padding: 1rem;
        min-height: 400px;
        white-space: normal;
        word-break: break-word;
      }

      #preview-content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.5rem 0;
      }

      #preview-content p,
      #preview-content blockquote,
      #preview-content ul,
      #preview-content ol,
      #preview-content table,
      #preview-content pre,
      #preview-content img {
        margin-bottom: 1rem;
      }

      #preview-content a img {
        vertical-align: middle;
        margin-right: 0.35em;
        position: relative;
        top: 6.5px;
      }

      #preview-content ul,
      #preview-content ol {
        margin: 0 0 1rem 1.5rem;
        padding-left: 1.5rem;
      }

      #preview-content table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1rem;
      }

      #preview-content th,
      #preview-content td {
        border: 1px solid var(--border);
        padding: 0.75rem 1rem;
        text-align: center;
      }

      #preview-content td {
        background: rgba(15, 23, 42, 0.03);
      }

      #preview-content li {
        margin-bottom: 0.5em;
        line-height: 1.6;
        list-style-position: outside;
      }

      #preview-content h1,
      #preview-content h2,
      #preview-content h3,
      #preview-content h4 {
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        font-weight: 600;
      }

      #preview-content h1,
      #preview-content h2,
      #preview-content h3,
      #preview-content h4 {
        margin-top: 1em;
        margin-bottom: 0.5em;
        font-weight: 600;
      }
      #preview-content p {
        margin-bottom: 1em;
      }
      #preview-content img {
        max-width: 100%;
      }

      .actions {
        padding: 1rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 0.75rem;
      }
      .btn {
        padding: 0.6rem 1.2rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-surface);
        color: var(--text-main);
        font-weight: 500;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }
      .btn:hover {
        border-color: var(--text-muted);
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }

      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #24292f;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 99px;
        font-weight: 500;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
        font-size: 0.9rem;
        color: var(--text-muted);
      }
      footer a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🐱 GitHub Profile README Generator 🎨</h1>
        <p>Create a stunning README.md for your GitHub profile in minutes.</p>
      </header>

      <main class="layout">
        <div class="panel">
          <div class="panel-header">Your Details</div>
          <div class="panel-body" id="form-inputs">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" data-readme-id="name" placeholder="Your Name" />
            </div>
            <div class="form-group">
              <label for="tagline">Tagline / Title</label>
              <input type="text" id="tagline" data-readme-id="tagline" placeholder="e.g. Full Stack Developer | Open Source Enthusiast" />
            </div>
            <div class="form-group">
              <label for="about">About Me</label>
              <textarea id="about" data-readme-id="about" placeholder="A little bit about yourself..."></textarea>
            </div>
            <div class="form-group">
              <label for="skills">Skills (comma-separated)</label>
              <input type="text" id="skills" data-readme-id="skills" placeholder="e.g. JavaScript, Python, Docker, AWS" />
            </div>
            <div class="form-group">
              <label for="github">GitHub Username</label>
              <input type="text" id="github" data-readme-id="github" placeholder="your-username" />
              <small id="github-status" style="display: block; min-height: 1rem; margin-top: 0.25rem; color: var(--text-muted)"></small>
            </div>
            <div class="form-group">
              <label for="x">X Username</label>
              <input type="text" id="x" data-readme-id="x" placeholder="your-handle" />
            </div>
            <div class="form-group">
              <label for="linkedin">LinkedIn URL</label>
              <input type="url" id="linkedin" data-readme-id="linkedin" placeholder="https://www.linkedin.com/in/your-profile" />
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header" style="padding: 0">
            <div class="tab-nav">
              <button class="tab-btn active" data-tab="markdown-content">Markdown</button>
              <button class="tab-btn" data-tab="preview-content">Preview</button>
            </div>
          </div>
          <div class="panel-body" style="padding: 0; flex-grow: 1">
            <div id="markdown-content" class="tab-pane active">
              <textarea id="markdown-editor"></textarea>
            </div>
            <div id="preview-content" class="tab-pane"></div>
          </div>
          <div class="actions">
            <button class="btn btn-primary" id="copyBtn">Copy Markdown</button>
            <button class="btn" id="downloadBtn">Download README.md</button>
          </div>
        </div>
      </main>

      <footer>
        <p>Project added by <a href="https://github.com/rhalbhavi">rhalbhavi</a></p>
      </footer>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
      const inputs = document.querySelectorAll("#form-inputs [data-readme-id]");
      const markdownEditor = document.getElementById("markdown-editor");
      const previewContent = document.getElementById("preview-content");
      const tabButtons = document.querySelectorAll(".tab-btn");
      const tabPanes = document.querySelectorAll(".tab-pane");
      const copyBtn = document.getElementById("copyBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const githubStatus = document.getElementById("github-status");
      const toast = document.getElementById("toast");
      let githubStats = null;
      let activeGithubRequest = null;
      let githubFetchTimer = null;

      function switchTab(tabId) {
        tabButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.tab === tabId);
        });
        tabPanes.forEach((pane) => {
          pane.classList.toggle("active", pane.id === tabId);
        });
      }

      function formatNumber(value) {
        if (value === null || value === undefined || value === "") {
          return "—";
        }
        return Number(value).toLocaleString();
      }

      async function fetchGithubStats(username) {
        const normalizedUsername = username.trim();
        if (!normalizedUsername) {
          githubStats = null;
          if (githubStatus) {
            githubStatus.textContent = "";
          }
          generateReadme();
          return;
        }

        if (githubStatus) {
          githubStatus.textContent = "Fetching GitHub stats...";
        }

        if (activeGithubRequest) {
          activeGithubRequest.abort();
        }

        const controller = new AbortController();
        activeGithubRequest = controller;

        try {
          const [userRes, reposRes] = await Promise.all([
            fetch(`https://api.github.com/users/${encodeURIComponent(normalizedUsername)}`, {
              headers: { Accept: "application/vnd.github+json" },
              signal: controller.signal
            }),
            fetch(`https://api.github.com/users/${encodeURIComponent(normalizedUsername)}/repos?per_page=100&page=1`, {
              headers: { Accept: "application/vnd.github+json" },
              signal: controller.signal
            })
          ]);

          if (!userRes.ok) {
            const errorText = await userRes.text();
            let message = "Unable to load GitHub stats";
            if (userRes.status === 403 || userRes.status === 429) {
              message = "Sorry, you are being rate limited. Please try again in some time."; // If GitHub API rate limit reached
            } else if (userRes.status === 404) {
              message = "GitHub user not found";
            }
            if (githubStatus) {
              githubStatus.textContent = message;
            }
            throw new Error(message);
          }

          const userData = await userRes.json();
          const reposData = reposRes.ok ? await reposRes.json() : [];

          let totalStars = 0;
          let totalForks = 0;
          reposData.forEach((repo) => {
            totalStars += repo.stargazers_count || 0;
            totalForks += repo.forks_count || 0;
          });

          githubStats = {
            repos: userData.public_repos ?? 0,
            totalStars,
            totalForks
          };

          if (githubStatus) {
            githubStatus.textContent = `Loaded stats for ${normalizedUsername}`;
          }
        } catch (error) {
          if (error.name === "AbortError") {
            return;
          }
          githubStats = null;
          if (githubStatus && githubStatus.textContent === "Fetching GitHub stats...") {
            githubStatus.textContent = error.message || "Unable to load GitHub stats";
          }
        } finally {
          if (activeGithubRequest === controller) {
            activeGithubRequest = null;
          }
        }

        generateReadme();
      }

      function generateReadme() {
        const data = {};
        inputs.forEach((input) => {
          data[input.dataset.readmeId] = input.value.trim();
        });

        let markdown = `## Hi there 👋, I'm ${data.name || "Your Name"}\n\n`;
        if (data.tagline) {
          markdown += `### ${data.tagline}\n\n---\n\n`;
        }
        if (data.about) {
          markdown += `${data.about}\n\n---\n\n`;
        }

        if (data.github && githubStats) {
          markdown += "### 📊 My Stats\n\n";
          markdown += `<table><tr>`;
          markdown += `<td align="center">📁 Repos<br><b>${formatNumber(githubStats.repos)}</b></td>`;
          markdown += `<td align="center">⭐ Total Stars<br><b>${formatNumber(githubStats.totalStars)}</b></td>`;
          markdown += `<td align="center">🍴 Total Forks<br><b>${formatNumber(githubStats.totalForks)}</b></td>`;
          markdown += `</tr></table>\n\n---\n\n`;
        }

        if (data.skills) {
          markdown += "### 💻 Tech Stack\n";
          const skills = data.skills.split(",").map((s) => s.trim());
          skills.forEach((skill) => {
            const skillEncoded = encodeURIComponent(skill.toLowerCase().replace(/\s/g, "-"));
            markdown += `<img src="https://img.shields.io/badge/${skill}-black?style=for-the-badge&logo=${skillEncoded}" alt="${skill}" /> `;
          });
          markdown += "\n\n---\n\n";
        }

        if (data.github || data.x || data.linkedin) {
          markdown += "### 🔗 Connect with me\n";
          const socialLinks = [];
          if (data.github) {
            socialLinks.push(`- [![GitHub](https://img.icons8.com/ios-filled/19/008080/github.png) GitHub](https://github.com/${data.github})`);
          }
          if (data.x) {
            socialLinks.push(`- [![X](https://img.icons8.com/ios-filled/16/ffffff/x.png)](https://x.com/${data.x})`);
          }
          if (data.linkedin) {
            socialLinks.push(`- [![LinkedIn](https://img.icons8.com/ios-filled/19/008080/linkedin.png) LinkedIn](${data.linkedin})`);
          }
          markdown += socialLinks.join("\n") + "\n\n";
        }

        if (markdownEditor) {
          markdownEditor.value = markdown;
        }

        if (previewContent) {
          if (typeof marked !== "undefined") {
            previewContent.innerHTML = marked.parse(markdown);
          } else {
            previewContent.textContent = markdown;
          }
        }

        return markdown;
      }

      inputs.forEach((input) => {
        if (input.id === "github") {
          input.addEventListener("input", () => {
            generateReadme();
            clearTimeout(githubFetchTimer);
            githubFetchTimer = setTimeout(() => fetchGithubStats(input.value), 500);
          });
        } else {
          input.addEventListener("input", generateReadme);
        }
      });

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => switchTab(button.dataset.tab));
      });

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      copyBtn.addEventListener("click", () => {
        const markdown = markdownEditor.value;
        if (markdown) {
          navigator.clipboard.writeText(markdown).then(() => {
            showToast("Markdown copied to clipboard!");
          });
        }
      });

      downloadBtn.addEventListener("click", () => {
        const markdown = markdownEditor.value;
        if (markdown) {
          const blob = new Blob([markdown], { type: "text/markdown" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "README.md";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
      });

      // Initial generation
      generateReadme();
      const githubInput = document.getElementById("github");
      if (githubInput && githubInput.value.trim()) {
        fetchGithubStats(githubInput.value);
      }
    </script>
  </body>
</html>
