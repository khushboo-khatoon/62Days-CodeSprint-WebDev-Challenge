<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EDE9DD;
    --paper-2: #E3DDCB;
    --ink: #24303B;
    --ink-soft: #5B6A76;
    --sky: #3E6D96;
    --sun: #D97706;
    --rain: #2E7D6B;
    --line: #C7BFA9;
    --card: #F6F3EA;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .wrap{
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
  }
  .isobars{
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 340px;
    z-index: 0;
    opacity: 0.5;
    pointer-events: none;
  }
  .content{ position: relative; z-index: 1; }

  header{
    display:flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }
  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }
  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 34px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .search-row{
    display:flex;
    gap: 8px;
    align-items: center;
  }
  #cityInput{
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    border: 1.5px solid var(--ink);
    background: var(--card);
    color: var(--ink);
    border-radius: 3px;
    width: 220px;
    outline: none;
  }
  #cityInput:focus{ border-color: var(--sky); }
  #searchBtn, .unit-toggle button{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 14px;
    padding: 10px 16px;
    border: 1.5px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    border-radius: 3px;
    cursor: pointer;
  }
  #searchBtn:hover{ background: var(--sky); border-color: var(--sky); }
  .unit-toggle{ display:flex; gap: 0; }
  .unit-toggle button{
    background: transparent;
    color: var(--ink);
    border-radius: 0;
  }
  .unit-toggle button:first-child{ border-radius: 3px 0 0 3px; border-right: none; }
  .unit-toggle button:last-child{ border-radius: 0 3px 3px 0; }
  .unit-toggle button.active{ background: var(--ink); color: var(--paper); }

  #status{
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    min-height: 20px;
    margin-bottom: 12px;
  }
  #status.err{ color: #A32D2D; }

  /* Station model panel */
  .station{
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    padding: 32px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 32px;
    align-items: center;
    margin-bottom: 28px;
  }
  .plot-wrap{ display:flex; justify-content:center; }
  .location-line{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .updated-line{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 20px;
  }
  .temp-row{
    display:flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }
  .temp-big{
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    color: var(--sun);
  }
  .condition-label{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink-soft);
  }
  .metrics{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 20px;
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }
  .metric .m-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin: 0 0 4px;
  }
  .metric .m-value{
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    margin: 0;
  }

  /* Forecast strip */
  .forecast-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 12px;
    border-top: 1px solid var(--line);
    padding-top: 20px;
  }
  .forecast-strip{
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .day-tag{
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--sky);
    border-radius: 3px;
    padding: 14px 12px;
    text-align: center;
  }
  .day-tag .d-name{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 14px;
    margin: 0 0 8px;
  }
  .day-tag .d-cond{
    font-size: 11px;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    margin: 0 0 10px;
    min-height: 26px;
    line-height: 1.3;
  }
  .day-tag .d-range{
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
  }
  .day-tag .d-range .lo{ color: var(--ink-soft); }
  .day-tag .d-range .hi{ color: var(--sun); }
  .day-tag .d-precip{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--sky);
    margin-top: 8px;
  }

  footer.credit{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 32px;
  }
  footer.credit a{ color: var(--sky); }

  @media (max-width: 640px){
    .station{ grid-template-columns: 1fr; }
    .forecast-strip{ grid-template-columns: repeat(2, 1fr); }
    header{ flex-direction: column; align-items: flex-start; }
    .temp-big{ font-size: 52px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <svg class="isobars" viewBox="0 0 900 340" preserveAspectRatio="none">
    <path d="M -50 60 C 150 20, 350 100, 950 40" fill="none" stroke="#24303B" stroke-width="1"/>
    <path d="M -50 110 C 200 60, 400 150, 950 90" fill="none" stroke="#24303B" stroke-width="1"/>
    <path d="M -50 160 C 250 110, 450 200, 950 140" fill="none" stroke="#24303B" stroke-width="1"/>
    <path d="M -50 210 C 180 260, 500 160, 950 220" fill="none" stroke="#24303B" stroke-width="1"/>
    <path d="M -50 260 C 220 310, 480 220, 950 270" fill="none" stroke="#24303B" stroke-width="1"/>
  </svg>

  <div class="content">
    <header>
      <div>
        <p class="eyebrow">Synoptic report</p>
        <h1>Weather dashboard</h1>
      </div>
      <div style="display:flex; flex-direction:column; gap:10px; align-items:flex-end;">
        <div class="search-row">
          <input id="cityInput" type="text" placeholder="Search a city..." />
          <button id="searchBtn">Search</button>
        </div>
        <div class="unit-toggle">
          <button id="unitC" class="active">°C</button>
          <button id="unitF">°F</button>
        </div>
      </div>
    </header>

    <p id="status">Locating you...</p>

    <div id="dashboard" style="display:none;">
      <div class="station">
        <div class="plot-wrap">
          <svg id="stationPlot" width="200" height="200" viewBox="0 0 200 200"></svg>
        </div>
        <div>
          <p class="location-line" id="locName">--</p>
          <p class="updated-line" id="updatedAt">--</p>
          <div class="temp-row">
            <span class="temp-big" id="tempNow">--°</span>
            <span class="condition-label" id="condNow">--</span>
          </div>
          <p style="font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--ink-soft); margin:0;">
            Feels like <span id="feelsLike">--</span>
          </p>
          <div class="metrics">
            <div class="metric">
              <p class="m-label">Humidity</p>
              <p class="m-value" id="humidity">--%</p>
            </div>
            <div class="metric">
              <p class="m-label">Wind</p>
              <p class="m-value" id="wind">-- km/h</p>
            </div>
            <div class="metric">
              <p class="m-label">Pressure</p>
              <p class="m-value" id="pressure">-- hPa</p>
            </div>
          </div>
        </div>
      </div>

      <p class="forecast-label">5-day outlook</p>
      <div class="forecast-strip" id="forecastStrip"></div>
    </div>

    <footer class="credit">Data: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></footer>
  </div>
</div>

<script>
let unit = 'c';
let lastData = null;

const WMO = {
  0:['Clear sky','☉'], 1:['Mainly clear','☉'], 2:['Partly cloudy','◐'], 3:['Overcast','●'],
  45:['Fog','≡'], 48:['Rime fog','≡'],
  51:['Light drizzle','⁘'], 53:['Drizzle','⁘'], 55:['Dense drizzle','⁘'],
  56:['Freezing drizzle','⁘'], 57:['Freezing drizzle','⁘'],
  61:['Light rain','⁚'], 63:['Rain','⁚'], 65:['Heavy rain','⁚'],
  66:['Freezing rain','⁚'], 67:['Freezing rain','⁚'],
  71:['Light snow','❄'], 73:['Snow','❄'], 75:['Heavy snow','❄'], 77:['Snow grains','❄'],
  80:['Light showers','⁚'], 81:['Showers','⁚'], 82:['Violent showers','⁚'],
  85:['Snow showers','❄'], 86:['Snow showers','❄'],
  95:['Thunderstorm','⚡'], 96:['Thunderstorm w/ hail','⚡'], 99:['Thunderstorm w/ hail','⚡']
};

function condFor(code){ return WMO[code] || ['Unknown','?']; }

function cToF(c){ return c * 9/5 + 32; }
function fmtTemp(c){
  const v = unit === 'c' ? c : cToF(c);
  return Math.round(v) + '°' + (unit === 'c' ? 'C' : 'F');
}

function setStatus(msg, isErr){
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = isErr ? 'err' : '';
}

function drawStationPlot(tempC, windDir, windSpeed, code){
  const svg = document.getElementById('stationPlot');
  const cx = 100, cy = 100, r = 70;
  const [, symbol] = condFor(code);
  let dirRad = (windDir - 90) * Math.PI / 180;
  const barbLen = 55;
  const x2 = cx + barbLen * Math.cos(dirRad);
  const y2 = cy + barbLen * Math.sin(dirRad);
  const ticks = [];
  for(let i=0;i<12;i++){
    const a = (i/12) * 2 * Math.PI;
    const x1 = cx + (r-6)*Math.cos(a), y1 = cy + (r-6)*Math.sin(a);
    const xx = cx + r*Math.cos(a), yy = cy + r*Math.sin(a);
    ticks.push(`<line x1="${x1}" y1="${y1}" x2="${xx}" y2="${yy}" stroke="#C7BFA9" stroke-width="1.5"/>`);
  }
  svg.innerHTML = `
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#24303B" stroke-width="1.5"/>
    ${ticks.join('')}
    <circle cx="${cx}" cy="${cy}" r="30" fill="#EDE9DD" stroke="#24303B" stroke-width="1.5"/>
    <text x="${cx}" y="${cy+8}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700" fill="#D97706">${symbol}</text>
    <line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#3E6D96" stroke-width="2.5" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 z" fill="#3E6D96"/>
      </marker>
    </defs>
  `;
}

function renderData(data, name){
  lastData = { data, name };
  const cur = data.current;
  const daily = data.daily;

  document.getElementById('dashboard').style.display = 'block';
  setStatus('Report current');

  document.getElementById('locName').textContent = name;
  document.getElementById('updatedAt').textContent = 'Observed ' + new Date(cur.time).toLocaleString([], {hour:'2-digit', minute:'2-digit', month:'short', day:'numeric'});

  const [condText] = condFor(cur.weather_code);
  document.getElementById('tempNow').textContent = fmtTemp(cur.temperature_2m);
  document.getElementById('condNow').textContent = condText;
  document.getElementById('feelsLike').textContent = fmtTemp(cur.apparent_temperature);
  document.getElementById('humidity').textContent = Math.round(cur.relative_humidity_2m) + '%';
  document.getElementById('wind').textContent = Math.round(cur.wind_speed_10m) + ' km/h';
  document.getElementById('pressure').textContent = Math.round(cur.pressure_msl) + ' hPa';

  drawStationPlot(cur.temperature_2m, cur.wind_direction_10m, cur.wind_speed_10m, cur.weather_code);

  const strip = document.getElementById('forecastStrip');
  strip.innerHTML = '';
  for(let i=0; i<5; i++){
    const dt = new Date(daily.time[i]);
    const dayName = i === 0 ? 'Today' : dt.toLocaleDateString([], {weekday:'short'});
    const [cond] = condFor(daily.weather_code[i]);
    const precip = daily.precipitation_probability_max[i];
    const el = document.createElement('div');
    el.className = 'day-tag';
    el.innerHTML = `
      <p class="d-name">${dayName}</p>
      <p class="d-cond">${cond}</p>
      <p class="d-range"><span class="hi">${fmtTemp(daily.temperature_2m_max[i])}</span> / <span class="lo">${fmtTemp(daily.temperature_2m_min[i])}</span></p>
      <p class="d-precip">${precip}% precip</p>
    `;
    strip.appendChild(el);
  }
}

async function fetchWeather(lat, lon, name){
  setStatus('Fetching conditions...');
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=5`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Forecast request failed');
    const data = await res.json();
    renderData(data, name);
  }catch(err){
    setStatus('Could not load weather data. Try again.', true);
  }
}

async function searchCity(query){
  setStatus('Searching for "' + query + '"...');
  try{
    const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`;
    const res = await fetch(geoUrl);
    const geo = await res.json();
    if(!geo.results || geo.results.length === 0){
      setStatus('No location found for "' + query + '". Try another search.', true);
      return;
    }
    const place = geo.results[0];
    const label = [place.name, place.admin1, place.country].filter(Boolean).join(', ');
    fetchWeather(place.latitude, place.longitude, label);
  }catch(err){
    setStatus('Search failed. Check your connection and try again.', true);
  }
}

function locateUser(){
  if(!navigator.geolocation){
    setStatus('Geolocation unavailable. Search for a city above.', true);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { latitude, longitude } = pos.coords;
      try{
        const revUrl = `https://geocoding-api.open-meteo.com/v1/search?name=&count=1&format=json`;
        fetchWeather(latitude, longitude, 'Your location');
      }catch(e){
        fetchWeather(latitude, longitude, 'Your location');
      }
    },
    () => {
      setStatus('Location access denied. Search for a city above.', true);
      fetchWeather(51.5074, -0.1278, 'London, United Kingdom');
    },
    { timeout: 6000 }
  );
}

document.getElementById('searchBtn').addEventListener('click', () => {
  const q = document.getElementById('cityInput').value.trim();
  if(q) searchCity(q);
});
document.getElementById('cityInput').addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const q = e.target.value.trim();
    if(q) searchCity(q);
  }
});
document.getElementById('unitC').addEventListener('click', () => {
  unit = 'c';
  document.getElementById('unitC').classList.add('active');
  document.getElementById('unitF').classList.remove('active');
  if(lastData) renderData(lastData.data, lastData.name);
});
document.getElementById('unitF').addEventListener('click', () => {
  unit = 'f';
  document.getElementById('unitF').classList.add('active');
  document.getElementById('unitC').classList.remove('active');
  if(lastData) renderData(lastData.data, lastData.name);
});

locateUser();
</script>
</body>
</html>
